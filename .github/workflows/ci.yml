name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
      - "feature/**"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUN_AZURITE_TESTS: "1"

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate docker compose
        run: docker compose config

      - name: Start Azurite
        run: docker compose up -d

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Stop Azurite
        if: always()
        run: docker compose down -v

  docker:
    runs-on: ubuntu-latest
    # Run docker build on every push/PR; push to ACR only on main/master merge.
    permissions:
      contents: read
      id-token: write  # Required for OIDC login to Azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (PR — build only, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: rustacian-blog:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure (OIDC)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image to ACR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/rustacian-blog:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/rustacian-blog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
