name: Search Index

# Rebuild the search index hourly and on manual dispatch.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for OIDC login to Azure

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build search-indexer
        run: cargo build -p rustacian_blog_search_indexer --release

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run search-indexer
        env:
          AZURITE_BLOB_ENDPOINT: https://${{ secrets.STORAGE_ACCOUNT_NAME }}.blob.core.windows.net
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}
        run: |
          export AZURE_STORAGE_ACCOUNT_KEY=$(az storage account keys list \
            --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
            --query "[0].value" -o tsv)
          ./target/release/search-indexer
