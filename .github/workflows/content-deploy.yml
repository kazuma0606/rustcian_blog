name: Content Deploy

# rustacian_blog_content リポジトリへの push で repository_dispatch イベントを受け取る。
# コンテンツを Azure Blob Storage にアップロードし、Container App を再起動する。
on:
  repository_dispatch:
    types: [content-updated]

jobs:
  deploy-content:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment: production

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout content repo
        run: |
          rm -rf content
          git clone https://x-access-token:${{ secrets.CONTENT_REPO_TOKEN }}@github.com/kazuma0606/rustcian_blog_content.git content

      - name: Generate posts/index.json
        run: |
          # AzuritePostRepository は posts/index.json のマニフェストを参照する。
          # az storage blob upload-batch は生ファイルしか転送しないため、
          # アップロード前にインデックスを生成してコンテンツに含める。
          INDEX="[]"
          for meta in content/posts/*/meta.yml; do
            slug=$(basename "$(dirname "$meta")")
            status=$(grep -m1 '^status:' "$meta" | sed 's/status:[[:space:]]*//' | tr -d '"' | tr -d "'" | tr -d ' ')
            entry=$(jq -n \
              --arg slug "$slug" \
              --arg status "$status" \
              --arg meta "posts/$slug/meta.yml" \
              --arg md "posts/$slug/post.md" \
              '{slug:$slug,status:$status,meta_blob_name:$meta,markdown_blob_name:$md}')
            INDEX=$(echo "$INDEX" | jq --argjson e "$entry" '. + [$e]')
          done
          echo "$INDEX" > content/posts/index.json
          echo "Generated index with $(echo "$INDEX" | jq length) posts:"
          echo "$INDEX" | jq '.[].slug + " (" + .status + ")"'

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload content to Blob Storage
        run: |
          az storage blob upload-batch \
            --source content \
            --destination blog-content \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --overwrite true

      - name: Restart Container App (rebuild search index)
        run: |
          REVISION=$(az containerapp revision list \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --query "[?properties.active].name | [0]" \
            --output tsv)
          az containerapp revision restart \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --revision "$REVISION"

      - name: Smoke test — health check
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
            if [ "$i" = "10" ]; then
              echo "Health check failed after retries" && exit 1
            fi
          done

      - name: Smoke test — post listing
        run: |
          COUNT=$(curl -s "https://rustacian-blog.com/" | grep -c 'class="card"')
          if [ "$COUNT" -lt 1 ]; then
            echo "No posts found in listing" && exit 1
          fi
          echo "Found $COUNT posts"
