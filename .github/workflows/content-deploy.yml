name: Content Deploy

# Triggered when rustcian_blog_content is pushed.
# Checks out fresh content, rebuilds the Docker image, and deploys.
on:
  repository_dispatch:
    types: [content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment: production

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: kazuma0606/rustcian_blog_content
          path: content
          # token: ${{ secrets.CONTENT_REPO_TOKEN }}  # コンテンツリポジトリが private の場合に追加

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/rustacian-blog:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/rustacian-blog:content-${{ github.event.client_payload.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Container App image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/rustacian-blog:content-${{ github.event.client_payload.sha }}"
          az containerapp update \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --image "$IMAGE"

      - name: Smoke test — health check
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after retries" && exit 1
