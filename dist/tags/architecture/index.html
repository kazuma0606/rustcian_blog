<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posts tagged architecture</title>
    
    <style>
      :root {
        --bg: #f7f1e7;
        --surface: rgba(255, 252, 246, 0.88);
        --line: #d9c2a3;
        --text: #1f2933;
        --muted: #52606d;
        --accent: #b3541e;
        --accent-soft: #efd8b9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(239, 216, 185, 0.9), transparent 32%),
          linear-gradient(160deg, #f7f1e7 0%, #efe5d4 100%);
        font-family: Georgia, "Times New Roman", serif;
      }
      a { color: inherit; }
      .shell {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 72px;
      }
      .hero {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(98, 72, 50, 0.12);
      }
      .eyebrow {
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--accent);
      }
      h1, h2, h3 { line-height: 1.1; }
      .posts {
        display: grid;
        gap: 18px;
        margin-top: 28px;
      }
      .card {
        display: grid;
        gap: 14px;
        border-radius: 24px;
        padding: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 249, 242, 0.94);
        text-decoration: none;
        box-shadow: 0 12px 28px rgba(98, 72, 50, 0.08);
      }
      .card img, .post img {
        width: 100%;
        max-height: 280px;
        object-fit: cover;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: white;
      }
      .meta {
        color: var(--muted);
        font-size: 14px;
      }
      .meta-stack {
        display: grid;
        gap: 6px;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #713f12;
        font-size: 13px;
      }
      .tag.is-info {
        background: #f2eadc;
        color: var(--muted);
      }
      .post {
        margin-top: 28px;
        padding: 28px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: rgba(255, 252, 246, 0.94);
      }
      .toc {
        margin-top: 24px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(247, 241, 231, 0.8);
      }
      .toc h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .toc ul {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }
      .toc a {
        text-decoration: none;
        color: var(--accent);
      }
      .post-body {
        line-height: 1.7;
      }
      .post-body pre {
        margin: 20px 0;
        padding: 18px 20px;
        overflow-x: auto;
        border-radius: 18px;
        border: 1px solid #d8c5ad;
        background: #2a211c;
        color: #f8efe4;
      }
      .post-body pre code {
        display: block;
        padding: 0;
        background: transparent;
        color: inherit;
        border: 0;
      }
      .post-body code {
        padding: 0.15em 0.45em;
        border-radius: 8px;
        background: rgba(239, 216, 185, 0.45);
        border: 1px solid rgba(179, 84, 30, 0.12);
        color: #713f12;
        font-family: "Courier New", monospace;
        font-size: 0.95em;
      }
      .post-body .katex-display {
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 0;
      }
      .math-fallback-note {
        margin-top: 24px;
        padding: 14px 16px;
        border: 1px solid #d3b689;
        border-radius: 16px;
        background: rgba(239, 216, 185, 0.55);
        color: #7c4a1d;
      }
      body.math-fallback .post-body .math-inline,
      body.math-fallback .post-body .math-display {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(247, 241, 231, 0.95);
        border: 1px dashed var(--line);
        font-family: "Courier New", monospace;
        white-space: pre-wrap;
      }
      body.math-fallback .post-body .math-display {
        display: block;
        padding: 12px 14px;
        margin: 16px 0;
        overflow-x: auto;
      }
      .ai-summary {
        margin-top: 24px;
        padding: 18px 20px;
        border-left: 4px solid var(--accent);
        background: rgba(239, 216, 185, 0.4);
        border-radius: 12px;
      }
      .chart-list {
        margin-top: 24px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(247, 241, 231, 0.7);
      }
      .chart-card {
        display: grid;
        gap: 12px;
        padding: 18px 0;
        border-top: 1px solid rgba(217, 194, 163, 0.8);
      }
      .chart-card:first-child {
        padding-top: 0;
        border-top: 0;
      }
      .chart-svg {
        width: 100%;
        height: auto;
        border-radius: 16px;
        border: 1px solid rgba(217, 194, 163, 0.8);
        background: linear-gradient(180deg, rgba(255, 252, 246, 0.96), rgba(247, 241, 231, 0.82));
      }
      .chart-caption {
        color: var(--muted);
        font-size: 14px;
      }
      .chart-list h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .chart-list code {
        font-size: 13px;
      }
      .chart-table-wrap {
        overflow-x: auto;
      }
      .chart-table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid rgba(217, 194, 163, 0.9);
        background: rgba(255, 252, 246, 0.9);
        font-size: 14px;
      }
      .chart-table th,
      .chart-table td {
        padding: 10px 12px;
        border: 1px solid rgba(217, 194, 163, 0.7);
        text-align: left;
        white-space: nowrap;
      }
      .chart-table th {
        background: rgba(239, 216, 185, 0.55);
      }
      .post-body h1, .post-body h2, .post-body h3 {
        margin-top: 1.8em;
      }
      .nav {
        display: inline-flex;
        margin-top: 20px;
        color: var(--accent);
        text-decoration: none;
      }
      @media (max-width: 640px) {
        .shell { padding: 20px 16px 48px; }
        .hero, .post, .card { border-radius: 22px; }
      }
    </style>
  </head>
  <body><main class="shell"><section class="hero"><div class="eyebrow">Tag Archive</div><h1>Posts tagged architecture</h1><p>`architecture` を付けた公開記事の一覧です。</p></section><section class="posts"><a href="/p/hello-rustacian-blog" class="card"><img src="/images/ferris-notes.svg" alt="Hello Rustacian Blog"><div class="meta-stack"><div class="meta">2026-03-18</div><div class="meta">Updated 2026-03-20</div></div><h2>Hello Rustacian Blog</h2><p>Rust フルスタック構成の PoC の狙いをまとめる最初の公開記事。</p><div class="tags"><span class="tag">rust</span><span class="tag">architecture</span><!><span class="tag is-info">TOC</span><span class="tag is-info">Math</span></div></a><!></section></main></body>
</html>
