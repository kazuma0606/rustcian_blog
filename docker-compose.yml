services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: rustacian-blog-azurite
    command: azurite --blobHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - azurite-data:/data

volumes:
  azurite-data:
